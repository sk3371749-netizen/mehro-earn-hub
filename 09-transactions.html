<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - Mehro Earn Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0f;
            color: #f5f5f7;
            min-height: 100vh;
        }
        .header {
            background: rgba(10,10,15,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,215,0,0.15);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h2 { color: #ffd700; font-size: 20px; }
        .header-actions button {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.15);
            color: #f5f5f7;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .header-actions button:hover { background: rgba(255,215,0,0.1); border-color: #ffd700; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .page-header { margin-bottom: 24px; }
        .page-header h1 { font-size: 28px; }
        .page-header h1 span { color: #ffd700; }
        .page-header p { color: rgba(255,255,255,0.5); }
        .filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .filters select, .filters input {
            padding: 10px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.15);
            border-radius: 10px;
            color: #f5f5f7;
            font-size: 14px;
        }
        .filters select:focus, .filters input:focus { outline: none; border-color: #ffd700; }
        .filters select option { background: #1a1a2e; }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.1);
            border-radius: 16px;
            padding: 20px;
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: rgba(255,255,255,0.3); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        td { font-size: 14px; }
        .positive { color: #4caf50; }
        .negative { color: #f44336; }
        .badge {
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-success { background: rgba(76,175,80,0.2); color: #4caf50; }
        .badge-warning { background: rgba(255,152,0,0.2); color: #ff9800; }
        .badge-danger { background: rgba(244,67,54,0.2); color: #f44336; }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
        }
        .pagination button {
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.15);
            border-radius: 8px;
            color: #f5f5f7;
            cursor: pointer;
            transition: all 0.3s;
        }
        .pagination button:hover { background: rgba(255,215,0,0.1); }
        .pagination button.active { background: #ffd700; color: #0a0a0f; border-color: #ffd700; }
        .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }
        .empty { text-align: center; padding: 40px; color: rgba(255,255,255,0.3); }
        @media (max-width: 768px) { table { font-size: 12px; } th, td { padding: 8px 10px; } }
    </style>
</head>
<body>

<div class="header">
    <h2>✨ Mehro Earn Hub</h2>
    <div class="header-actions">
        <button onclick="window.location.href='06-wallet.html'">⬅ Back</button>
        <button onclick="window.location.href='01-login.html'">Logout</button>
    </div>
</div>

<div class="container">
    <div class="page-header">
        <h1>📊 <span>Transaction History</span></h1>
        <p>View all your transactions</p>
    </div>

    <div class="filters">
        <select id="typeFilter" onchange="loadTransactions(1)">
            <option value="">All Types</option>
            <option value="deposit">Deposit</option>
            <option value="withdraw">Withdraw</option>
            <option value="daily_earning">Daily Earning</option>
            <option value="referral_bonus">Referral Bonus</option>
            <option value="referral_salary">Referral Salary</option>
            <option value="manual_bonus">Manual Bonus</option>
            <option value="auto_earning">Auto Earning</option>
            <option value="penalty">Penalty</option>
            <option value="refund">Refund</option>
        </select>
        <input type="date" id="dateFrom" onchange="loadTransactions(1)">
        <input type="date" id="dateTo" onchange="loadTransactions(1)">
        <button class="btn-secondary" onclick="resetFilters()">Reset</button>
    </div>

    <div class="card">
        <div id="transactionsContainer">
            <div class="empty">Loading transactions...</div>
        </div>
        <div class="pagination" id="pagination"></div>
    </div>
</div>

<style>
.btn-secondary {
    padding: 10px 20px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,215,0,0.15);
    border-radius: 10px;
    color: #f5f5f7;
    cursor: pointer;
    transition: all 0.3s;
}
.btn-secondary:hover { background: rgba(255,215,0,0.1); border-color: #ffd700; }
</style>

<script>
const token = localStorage.getItem('token');
if (!token) { window.location.href = '01-login.html'; }

let currentPage = 1;
let totalPages = 1;

async function loadTransactions(page = 1) {
    currentPage = page;
    const type = document.getElementById('typeFilter').value;
    const dateFrom = document.getElementById('dateFrom').value;
    const dateTo = document.getElementById('dateTo').value;
    
    let url = `/api/wallet/transactions?page=${page}&limit=20`;
    if (type) url += `&type=${type}`;
    
    try {
        const res = await fetch(url, {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        if (!data.success) { throw new Error(data.message); }
        
        const txns = data.data.data || [];
        totalPages = Math.ceil(data.data.total / data.data.limit) || 1;
        
        renderTransactions(txns);
        renderPagination();
    } catch (error) {
        document.getElementById('transactionsContainer').innerHTML = '<div class="empty">Failed to load transactions</div>';
    }
}

function renderTransactions(txns) {
    const container = document.getElementById('transactionsContainer');
    
    if (txns.length === 0) {
        container.innerHTML = '<div class="empty">No transactions found</div>';
        return;
    }
    
    container.innerHTML = `
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Type</th>
                    <th>Description</th>
                    <th>Amount</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                ${txns.map(t => `
                    <tr>
                        <td>${new Date(t.transaction_date).toLocaleDateString()}</td>
                        <td><span class="badge badge-${t.type === 'withdraw' ? 'danger' : 'success'}">${t.type.replace('_', ' ')}</span></td>
                        <td>${t.description || '-'}</td>
                        <td class="${t.amount > 0 ? 'positive' : 'negative'}">${t.amount > 0 ? '+' : ''}${t.amount} PKR</td>
                        <td><span class="badge badge-${t.status === 'completed' ? 'success' : t.status === 'pending' ? 'warning' : 'danger'}">${t.status}</span></td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
    `;
}

function renderPagination() {
    const container = document.getElementById('pagination');
    let html = `<button onclick="loadTransactions(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>‹ Previous</button>`;
    
    for (let i = 1; i <= Math.min(totalPages, 5); i++) {
        html += `<button onclick="loadTransactions(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
    }
    
    if (totalPages > 5) {
        html += `<span>...</span>`;
        html += `<button onclick="loadTransactions(${totalPages})">${totalPages}</button>`;
    }
    
    html += `<button onclick="loadTransactions(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>Next ›</button>`;
    container.innerHTML = html;
}

function resetFilters() {
    document.getElementById('typeFilter').value = '';
    document.getElementById('dateFrom').value = '';
    document.getElementById('dateTo').value = '';
    loadTransactions(1);
}

loadTransactions(1);
</script>

</body>
</html>
