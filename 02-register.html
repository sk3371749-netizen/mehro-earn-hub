<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Mehro Earn Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            padding: 20px;
        }
        .register-container {
            width: 100%;
            max-width: 440px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,215,0,0.15);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { 
            background: linear-gradient(135deg, #ffd700, #c9a800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
        }
        .logo p { color: rgba(255,255,255,0.5); font-size: 14px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; color: #f5f5f7; font-size: 14px; margin-bottom: 6px; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.15);
            border-radius: 10px;
            color: #f5f5f7;
            font-size: 15px;
        }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #ffd700; }
        .form-group select option { background: #1a1a2e; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ffd700, #c9a800);
            border: none;
            border-radius: 10px;
            color: #0a0a0f;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(255,215,0,0.3); }
        .footer { text-align: center; margin-top: 20px; color: rgba(255,255,255,0.4); font-size: 14px; }
        .footer a { color: #ffd700; text-decoration: none; }
        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .alert-danger { background: rgba(244,67,54,0.1); border: 1px solid rgba(244,67,54,0.2); color: #f44336; }
        .alert-success { background: rgba(76,175,80,0.1); border: 1px solid rgba(76,175,80,0.2); color: #4caf50; }
        .hint { color: rgba(255,255,255,0.3); font-size: 12px; margin-top: 4px; }
    </style>
</head>
<body>

<div class="register-container">
    <div class="logo">
        <h1>✨ Mehro Earn Hub</h1>
        <p>Create your account</p>
    </div>
    
    <div id="alertBox"></div>
    
    <form id="registerForm">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="fullName" placeholder="Enter your full name" required>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="Enter your phone number">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Min 6 characters" required>
        </div>
        <div class="form-group">
            <label>Referral Code (Optional)</label>
            <input type="text" id="referralCode" placeholder="Enter referral code">
            <div class="hint">Enter a referral code to earn bonus</div>
        </div>
        <button type="submit" class="btn">🚀 Create Account</button>
    </form>
    
    <div class="footer">
        Already have an account? <a href="01-login.html">Login</a>
    </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const full_name = document.getElementById('fullName').value;
    const email = document.getElementById('email').value;
    const phone = document.getElementById('phone').value;
    const password = document.getElementById('password').value;
    const referral_code = document.getElementById('referralCode').value;
    const alertBox = document.getElementById('alertBox');
    
    alertBox.innerHTML = '';
    
    if (!full_name || !email || !password) {
        alertBox.innerHTML = '<div class="alert alert-danger">Please fill in all required fields</div>';
        return;
    }
    
    if (password.length < 6) {
        alertBox.innerHTML = '<div class="alert alert-danger">Password must be at least 6 characters</div>';
        return;
    }
    
    try {
        const response = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ full_name, email, phone, password, referral_code })
        });
        const data = await response.json();
        
        if (data.success) {
            localStorage.setItem('token', data.data.token);
            alertBox.innerHTML = '<div class="alert alert-success">✅ Registration successful! Redirecting...</div>';
            setTimeout(() => { window.location.href = '03-dashboard.html'; }, 1500);
        } else {
            alertBox.innerHTML = '<div class="alert alert-danger">❌ ' + data.message + '</div>';
        }
    } catch (error) {
        alertBox.innerHTML = '<div class="alert alert-danger">❌ Registration failed. Please try again.</div>';
    }
});
</script>

</body>
</html>
