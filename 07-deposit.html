<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit - Mehro Earn Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0f;
            color: #f5f5f7;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            background: rgba(10,10,15,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,215,0,0.15);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            margin: -20px -20px 20px -20px;
        }
        .header h2 { color: #ffd700; font-size: 20px; }
        .header-actions button {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.15);
            color: #f5f5f7;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .header-actions button:hover { background: rgba(255,215,0,0.1); border-color: #ffd700; }
        .container { max-width: 500px; margin: 0 auto; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; color: #f5f5f7; font-size: 14px; margin-bottom: 6px; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.15);
            border-radius: 10px;
            color: #f5f5f7;
            font-size: 15px;
        }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #ffd700; }
        .form-group select option { background: #1a1a2e; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ffd700, #c9a800);
            border: none;
            border-radius: 10px;
            color: #0a0a0f;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(255,215,0,0.3); }
        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .alert-danger { background: rgba(244,67,54,0.1); border: 1px solid rgba(244,67,54,0.2); color: #f44336; }
        .alert-success { background: rgba(76,175,80,0.1); border: 1px solid rgba(76,175,80,0.2); color: #4caf50; }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.1);
            border-radius: 16px;
            padding: 24px;
        }
        .card h3 { margin-bottom: 16px; color: #ffd700; }
    </style>
</head>
<body>

<div class="header">
    <h2>✨ Mehro Earn Hub</h2>
    <div class="header-actions">
        <button onclick="window.location.href='06-wallet.html'">⬅ Back</button>
        <button onclick="window.location.href='01-login.html'">Logout</button>
    </div>
</div>

<div class="container">
    <div class="card">
        <h3>💰 Make a Deposit</h3>
        <div id="alertBox"></div>
        <form id="depositForm">
            <div class="form-group">
                <label>Select Plan</label>
                <select id="planId" required></select>
            </div>
            <div class="form-group">
                <label>Amount (PKR)</label>
                <input type="number" id="amount" placeholder="Enter amount" required>
            </div>
            <div class="form-group">
                <label>Payment Method</label>
                <select id="paymentMethod" required>
                    <option value="">Select Method</option>
                    <option value="EasyPaisa">EasyPaisa</option>
                    <option value="JazzCash">JazzCash</option>
                    <option value="Bank Transfer">Bank Transfer</option>
                    <option value="USDT">USDT</option>
                </select>
            </div>
            <div class="form-group">
                <label>Account Name</label>
                <input type="text" id="accountName" placeholder="Enter account holder name" required>
            </div>
            <div class="form-group">
                <label>Account Number</label>
                <input type="text" id="accountNumber" placeholder="Enter account number" required>
            </div>
            <div class="form-group">
                <label>Transaction ID</label>
                <input type="text" id="transactionId" placeholder="Enter transaction ID" required>
            </div>
            <div class="form-group">
                <label>Screenshot (Optional)</label>
                <input type="file" id="screenshot" accept="image/*">
            </div>
            <button type="submit" class="btn">💰 Submit Deposit Request</button>
        </form>
    </div>
</div>

<script>
const token = localStorage.getItem('token');
if (!token) { window.location.href = '01-login.html'; }

async function loadPlans() {
    try {
        const res = await fetch('/api/plans');
        const data = await res.json();
        if (!data.success) { throw new Error(data.message); }
        
        const select = document.getElementById('planId');
        select.innerHTML = '<option value="">Select a plan</option>' + 
            data.data.plans.map(p => `<option value="${p.id}">${p.plan_name} - ${p.price} PKR</option>`).join('');
    } catch (error) {
        console.error('Plans error:', error);
    }
}

document.getElementById('depositForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const alertBox = document.getElementById('alertBox');
    alertBox.innerHTML = '';
    
    const plan_id = document.getElementById('planId').value;
    const amount = document.getElementById('amount').value;
    const payment_method = document.getElementById('paymentMethod').value;
    const account_name = document.getElementById('accountName').value.trim();
    const account_number = document.getElementById('accountNumber').value.trim();
    const transaction_id = document.getElementById('transactionId').value.trim();
    const screenshot = document.getElementById('screenshot').files[0];
    
    if (!plan_id || !amount || !payment_method || !account_name || !account_number || !transaction_id) {
        alertBox.innerHTML = '<div class="alert alert-danger">Please fill in all required fields</div>';
        return;
    }
    
    let screenshotPath = null;
    if (screenshot) {
        const formData = new FormData();
        formData.append('file', screenshot);
        try {
            const uploadRes = await fetch('/api/upload', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token },
                body: formData
            });
            const uploadData = await uploadRes.json();
            if (uploadData.success) { screenshotPath = uploadData.data.file_path; }
        } catch (error) { console.error('Upload error:', error); }
    }
    
    const data = { plan_id, amount, payment_method, account_name, account_number, transaction_id, screenshot: screenshotPath };
    
    try {
        const res = await fetch('/api/plans/activate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.success) {
            alertBox.innerHTML = '<div class="alert alert-success">✅ Deposit request submitted! Redirecting...</div>';
            setTimeout(() => { window.location.href = '06-wallet.html'; }, 2000);
        } else {
            alertBox.innerHTML = '<div class="alert alert-danger">❌ ' + result.message + '</div>';
        }
    } catch (error) {
        alertBox.innerHTML = '<div class="alert alert-danger">❌ Deposit failed. Please try again.</div>';
    }
});

loadPlans();
</script>

</body>
</html>
