<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw - Mehro Earn Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0f;
            color: #f5f5f7;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            background: rgba(10,10,15,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,215,0,0.15);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            margin: -20px -20px 20px -20px;
        }
        .header h2 { color: #ffd700; font-size: 20px; }
        .header-actions button {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.15);
            color: #f5f5f7;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .header-actions button:hover { background: rgba(255,215,0,0.1); border-color: #ffd700; }
        .container { max-width: 500px; margin: 0 auto; }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }
        .info-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.1);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .info-card .label { color: rgba(255,255,255,0.3); font-size: 12px; }
        .info-card .value { font-size: 18px; font-weight: bold; color: #ffd700; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; color: #f5f5f7; font-size: 14px; margin-bottom: 6px; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.15);
            border-radius: 10px;
            color: #f5f5f7;
            font-size: 15px;
        }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #ffd700; }
        .form-group select option { background: #1a1a2e; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ffd700, #c9a800);
            border: none;
            border-radius: 10px;
            color: #0a0a0f;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(255,215,0,0.3); }
        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .alert-danger { background: rgba(244,67,54,0.1); border: 1px solid rgba(244,67,54,0.2); color: #f44336; }
        .alert-success { background: rgba(76,175,80,0.1); border: 1px solid rgba(76,175,80,0.2); color: #4caf50; }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.1);
            border-radius: 16px;
            padding: 24px;
        }
        .card h3 { margin-bottom: 16px; color: #ffd700; }
        @media (max-width: 768px) { .info-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="header">
    <h2>✨ Mehro Earn Hub</h2>
    <div class="header-actions">
        <button onclick="window.location.href='06-wallet.html'">⬅ Back</button>
        <button onclick="window.location.href='01-login.html'">Logout</button>
    </div>
</div>

<div class="container">
    <div class="info-grid">
        <div class="info-card"><div class="label">Available Balance</div><div class="value" id="availBalance">0 PKR</div></div>
        <div class="info-card"><div class="label">Min Withdraw</div><div class="value" id="minWithdraw">100 PKR</div></div>
        <div class="info-card"><div class="label">Max Withdraw</div><div class="value" id="maxWithdraw">100,000 PKR</div></div>
    </div>

    <div class="card">
        <h3>💸 Withdraw Funds</h3>
        <div id="alertBox"></div>
        <form id="withdrawForm">
            <div class="form-group">
                <label>Amount (PKR)</label>
                <input type="number" id="amount" placeholder="Enter amount" required>
            </div>
            <div class="form-group">
                <label>Payment Method</label>
                <select id="paymentMethod" required>
                    <option value="">Select Method</option>
                    <option value="EasyPaisa">EasyPaisa</option>
                    <option value="JazzCash">JazzCash</option>
                    <option value="Bank Transfer">Bank Transfer</option>
                    <option value="USDT">USDT</option>
                </select>
            </div>
            <div class="form-group">
                <label>Account Name</label>
                <input type="text" id="accountName" placeholder="Enter account holder name" required>
            </div>
            <div class="form-group">
                <label>Account Number</label>
                <input type="text" id="accountNumber" placeholder="Enter account number" required>
            </div>
            <button type="submit" class="btn">💸 Submit Withdraw Request</button>
        </form>
    </div>
</div>

<script>
const token = localStorage.getItem('token');
if (!token) { window.location.href = '01-login.html'; }

async function loadWallet() {
    try {
        const res = await fetch('/api/wallet/balance', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        if (!data.success) { throw new Error(data.message); }
        document.getElementById('availBalance').textContent = (data.data.balance?.wallet_balance || 0) + ' PKR';
    } catch (error) { console.error('Wallet error:', error); }
}

document.getElementById('withdrawForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const alertBox = document.getElementById('alertBox');
    alertBox.innerHTML = '';
    
    const amount = document.getElementById('amount').value;
    const payment_method = document.getElementById('paymentMethod').value;
    const account_name = document.getElementById('accountName').value.trim();
    const account_number = document.getElementById('accountNumber').value.trim();
    
    if (!amount || !payment_method || !account_name || !account_number) {
        alertBox.innerHTML = '<div class="alert alert-danger">Please fill in all fields</div>';
        return;
    }
    
    if (parseFloat(amount) < 100) {
        alertBox.innerHTML = '<div class="alert alert-danger">Minimum withdraw is 100 PKR</div>';
        return;
    }
    
    const data = { amount, payment_method, account_name, account_number };
    
    try {
        const res = await fetch('/api/wallet/withdraw', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.success) {
            alertBox.innerHTML = '<div class="alert alert-success">✅ Withdraw request submitted! Redirecting...</div>';
            setTimeout(() => { window.location.href = '06-wallet.html'; }, 2000);
        } else {
            alertBox.innerHTML = '<div class="alert alert-danger">❌ ' + result.message + '</div>';
        }
    } catch (error) {
        alertBox.innerHTML = '<div class="alert alert-danger">❌ Withdraw failed. Please try again.</div>';
    }
});

loadWallet();
</script>

</body>
</html>
